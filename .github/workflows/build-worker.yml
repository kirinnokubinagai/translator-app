name: Build RunPod Worker

on:
  push:
    paths:
      - 'runpod-worker/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/translategemma-worker:latest
            ghcr.io/${{ github.repository_owner }}/translategemma-worker:4b
