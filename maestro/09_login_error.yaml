appId: com.talkable.app
---
- runFlow: _open_login.yaml

# ログインエラーハンドリングテスト

# 間違ったパスワードでログイン
- tapOn: "メールアドレス"
- inputText: "functest@example.com"

- tapOn: "パスワード"
- inputText: "WrongPassword123"

- tapOn:
    text: "ログイン"
    index: 1

# エラーメッセージが表示される
- extendedWaitUntil:
    visible: "ログイン"
    timeout: 10000
